# config.yaml
# ═══════════════════════════════════════════════════════
#  Cephalon Luna — Configuração Central
#  Edite aqui para ajustar o comportamento do modelo.
#  Não é necessário mexer no código Python.
# ═══════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────
#  CAMINHOS
# ───────────────────────────────────────────────────────
paths:
  raw_data:        "cephalon_luna/data/raw"
  processed_data:  "cephalon_luna/data/processed"
  tokenizer:       "cephalon_luna/data/tokenizer/tokenizer.json"
  latest_model:    "cephalon_luna/models/latest/model.pt"
  checkpoints:     "cephalon_luna/models/checkpoints"
  logs:            "cephalon_luna/models/logs"

# ───────────────────────────────────────────────────────
#  DADOS
# ───────────────────────────────────────────────────────
data:
  augment:         true
  val_ratio:       0.1

# ───────────────────────────────────────────────────────
#  MODELO
# ───────────────────────────────────────────────────────
model:
  vocab_size:      2000
  context_len:     256
  d_model:         256
  num_heads:       8
  num_layers:      6
  d_ff:            1024
  dropout:         0.1

# ───────────────────────────────────────────────────────
#  TREINAMENTO
# ───────────────────────────────────────────────────────
training:
  epochs:          20
  batch_size:      16
  lr:              3e-4
  grad_clip:       1.0
  resume:          false

  scheduler:
    enabled:       true
    type:          "cosine"
    warmup_epochs: 2

# ───────────────────────────────────────────────────────
#  GERAÇÃO
# ───────────────────────────────────────────────────────
generation:
  temperature:     0.7
  top_k:           40
  max_new_tokens:  120

# ───────────────────────────────────────────────────────
#  CHECKPOINTS
# ───────────────────────────────────────────────────────
checkpoint:
  save_every_n:    5
  keep_last_n:     3

# ───────────────────────────────────────────────────────
#  LOGGING
# ───────────────────────────────────────────────────────
logging:
  log_every_pct:   20
  show_samples:    true
  num_samples:     2
  sample_prompts:
    - "<usr>Quem é você?<sep>"
    - "<usr>O que é Python?<sep>"
    - "<usr>Olá!<sep>"
    - "<usr>Você tem sentimentos?<sep>"

# ───────────────────────────────────────────────────────
#  HARDWARE
# ───────────────────────────────────────────────────────
hardware:
  device:          "auto"
  seed:            42