# config.yaml
# ═══════════════════════════════════════════════════════
#  Cephalon Luna — Configuração Central
#  Edite aqui para ajustar o comportamento do modelo.
#  Não é necessário mexer no código Python.
# ═══════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────
#  CAMINHOS
# ───────────────────────────────────────────────────────
paths:
  raw_data:        "data/raw"
  processed_data:  "data/processed"
  tokenizer:       "data/tokenizer/tokenizer.json"
  latest_model:    "models/latest/model.pth"
  checkpoints:     "models/checkpoints"
  logs:            "models/logs"

# ───────────────────────────────────────────────────────
#  DADOS
# ───────────────────────────────────────────────────────
data:
  augment:         false
  val_ratio:       0.1

# ───────────────────────────────────────────────────────
#  MODELO
# ───────────────────────────────────────────────────────
model:
  vocab_size:      2000
  context_len:     128
  d_model:         128
  num_heads:       4
  num_layers:      4
  d_ff:            512
  dropout:         0.1

# ───────────────────────────────────────────────────────
#  TREINAMENTO
# ───────────────────────────────────────────────────────
training:
  epochs:          20
  batch_size:      8
  lr:              3e-4
  grad_clip:       1.0
  resume:          false

  scheduler:
    enabled:       true
    type:          "cosine"
    warmup_epochs: 5

# ───────────────────────────────────────────────────────
#  GERAÇÃO
# ───────────────────────────────────────────────────────
generation:
  temperature:     0.6
  top_k:           10
  max_new_tokens:  50

# ───────────────────────────────────────────────────────
#  CHECKPOINTS
# ───────────────────────────────────────────────────────
checkpoint:
  save_every_n:    2
  keep_last_n:     1

# ───────────────────────────────────────────────────────
#  LOGGING
# ───────────────────────────────────────────────────────
logging:
  log_every_pct:   50
  show_samples:    true
  num_samples:     1
  sample_prompts:
    - "<usr>Olá cephalon!<sep>"
    - "<usr>Você sabe que é uma IA?<sep>"
    - "<usr>Você tem identidade própria?<sep>"
    - "<usr>Você tem sentimentos?<sep>"

# ───────────────────────────────────────────────────────
#  HARDWARE
# ───────────────────────────────────────────────────────
hardware:
  device:          "cpu"
  seed:            42